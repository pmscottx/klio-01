<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Klio — Inspekcja pojazdu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title mb-1">Inspekcja pojazdu</h2>
                    <p class="text-muted mb-4">Wybierz co najmniej 3 zdjęcia do analizy.</p>

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form action="/submit" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Dostępne zdjęcia</label>
                            {% for img in images %}
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="filenames" value="{{ img }}" id="img-{{ loop.index }}">
                                <label class="form-check-label" for="img-{{ loop.index }}">{{ img }}</label>
                            </div>
                            {% endfor %}
                            <div class="form-text">Zaznacz minimum 3 pliki.</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Wyślij do analizy
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
